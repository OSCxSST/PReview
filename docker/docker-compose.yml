services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: preview
      POSTGRES_PASSWORD: preview_dev
      POSTGRES_DB: preview
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U preview"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    ports:
      - "3000:3000"
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://preview:preview_dev@postgres:5432/preview
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dashboard
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"

volumes:
  pgdata:
  redisdata:
